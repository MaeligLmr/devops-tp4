<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TP4 - DevOps</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .services { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 16px; flex: 1; min-width: 180px; }
    .card h2 { font-size: 1rem; margin: 0 0 8px; }
    .card p { font-size: 0.85rem; color: #666; margin: 0; }
  </style>
</head>
<body>
  <h1>TP4 DevOps - Microservices</h1>
  <p>Application composée de plusieurs services indépendants.</p>
  <div class="services">
    <div class="card">
      <h2>Authentification</h2>
      <p>Gestion des utilisateurs et des tokens JWT.</p>
    </div>
    <div class="card">
      <h2>Produits</h2>
      <p>Catalogue et gestion des produits.</p>
    </div>
    <div class="card">
      <h2>Commandes</h2>
      <p>Création et suivi des commandes.</p>
    </div>
  </div>
</body>
</html>
